// --- localStorage-backed shim for window.storage ---
// Matches the API used by Claude artifacts so the rest of the code is unchanged.
window.storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v !== null ? { key, value: v, shared: false } : null;
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix, shared: false };
  },
};

const uid = () => Math.random().toString(36).slice(2, 10);
const coachById = (id) => COACHES.find((c) => c.id === id);

// Cluster shifts by groupId (falling back to shift id for legacy/standalone shifts).
// Returns an array of groups; each group is an array of shifts sorted by date+time.
const groupShifts = (shiftsArr) => {
  const map = new Map();
  for (const s of shiftsArr) {
    const key = s.groupId || s.id;
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(s);
  }
  const groups = Array.from(map.values());
  groups.forEach((g) => g.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)));
  return groups;
};

const formatDay = (iso) => {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
};
const formatRelative = (iso) => {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
};
const hoursUntil = (dateISO, timeStr) => {
  const [h, m] = timeStr.split(':');
  const target = new Date(dateISO + 'T00:00:00');
  target.setHours(parseInt(h, 10), parseInt(m, 10), 0, 0);
  return (target.getTime() - Date.now()) / 3600000;
};
const isPast = (dateISO, timeStr) => hoursUntil(dateISO, timeStr) < 0;
const shiftDateISO = (iso, days) => {
  // Parse/format using local date components to avoid a UTC roundtrip bug
  // that knocks dates back by a day in timezones ahead of UTC (e.g. Amsterdam).
  const [y, m, d] = iso.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  date.setDate(date.getDate() + days);
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
};
const addHoursToTime = (timeStr, hours) => {
  const [h, m] = timeStr.split(':').map(Number);
  const newH = (h + hours) % 24;
  return `${String(newH).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
};
const dateToISO = (d) => {
  // Serialize a JS Date to YYYY-MM-DD using local components (avoids UTC roundtrip bugs)
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
};

// ----------------------------------------------------------------
function App() {
  const [loading, setLoading]       = useState(true);
  const [currentUserId, setCurrent] = useState('c2');
  const [viewAs, setViewAs]         = useState('coach'); // 'coach' | 'manager' — for dual-role users
  const [shifts, setShifts]         = useState([]);
  const [notifs, setNotifs]         = useState([]);
  const [modal, setModal]           = useState(null);
  const [introOpen, setIntroOpen]   = useState(false);
  const [personaOpen, setPersona]   = useState(false);

  const currentUser = coachById(currentUserId);
  const hasDualRole = (currentUser?.role?.length ?? 0) > 1;
  const isManager   = currentUser?.role?.includes('manager') && (hasDualRole ? viewAs === 'manager' : true);

  // ---- Storage load
  useEffect(() => {
    (async () => {
      try {
        const s = await window.storage.get('cover_shifts');
        const loaded = s ? JSON.parse(s.value) : SEED_SHIFTS;
        // Migration: any shift without a groupId gets treated as its own single-shift group
        const migrated = loaded.map((sh) => ({ ...sh, groupId: sh.groupId || sh.id }));
        setShifts(migrated);
      } catch { setShifts(SEED_SHIFTS); }
      try {
        const n = await window.storage.get('cover_notifs');
        setNotifs(n ? JSON.parse(n.value) : SEED_NOTIFS);
      } catch { setNotifs(SEED_NOTIFS); }
      try {
        const intro = await window.storage.get('cover_intro_dismissed');
        setIntroOpen(!intro);
      } catch { setIntroOpen(true); }
      setLoading(false);
    })();
  }, []);

  // ---- Storage save
  useEffect(() => {
    if (loading) return;
    window.storage.set('cover_shifts', JSON.stringify(shifts)).catch(() => {});
  }, [shifts, loading]);
  useEffect(() => {
    if (loading) return;
    window.storage.set('cover_notifs', JSON.stringify(notifs)).catch(() => {});
  }, [notifs, loading]);

  const dismissIntro = () => {
    setIntroOpen(false);
    window.storage.set('cover_intro_dismissed', '1').catch(() => {});
  };

  const resetDemo = async () => {
    try {
      await window.storage.set('cover_shifts', JSON.stringify(SEED_SHIFTS));
      await window.storage.set('cover_notifs', JSON.stringify(SEED_NOTIFS));
    } catch {}
    setShifts(SEED_SHIFTS);
    setNotifs(SEED_NOTIFS);
    setModal(null);
  };

  // ---- Actions
  const postShift = (entries) => {
    // `entries` is always an array of rows. Each row can have `shifts > 1` which
    // means "N back-to-back hourly classes starting at `time`".
    // All shifts from a single submission get the same groupId — displayed as ONE request.
    const groupId = uid();
    const createdAt = new Date().toISOString();
    const allShifts = [];
    entries.forEach((entry) => {
      const count = Math.max(1, Math.min(6, Number(entry.shifts) || 1));
      for (let i = 0; i < count; i++) {
        allShifts.push({
          id: uid(),
          groupId,
          postedBy: currentUserId,
          date: entry.date,
          time: i === 0 ? entry.time : addHoursToTime(entry.time, i),
          className: entry.className,
          reason: entry.reason,
          status: 'open',
          claimedBy: null,
          claimedAt: null,
          createdAt,
        });
      }
    });
    allShifts.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

    setShifts((prev) => [...allShifts, ...prev]);
    setNotifs((prev) => [
      {
        id: uid(),
        type: 'posted',
        aboutShiftIds: allShifts.map((s) => s.id),
        groupId,
        byCoachId: currentUserId,
        at: createdAt,
      },
      ...prev,
    ]);
    setModal({
      type: 'email-preview',
      subtype: 'posted',
      shift: allShifts[0],
      emails: buildPostedEmails(allShifts),
    });
  };

  const claimShift = (shiftOrShifts) => {
    // Accept either a single shift or an array (multi-select from a group)
    const toClaim = Array.isArray(shiftOrShifts) ? shiftOrShifts : [shiftOrShifts];
    const claimedAt = new Date().toISOString();
    const idSet = new Set(toClaim.map((s) => s.id));
    const updatedShifts = toClaim.map((s) => ({
      ...s, status: 'claimed', claimedBy: currentUserId, claimedAt,
    }));
    setShifts((prev) =>
      prev.map((s) => (idSet.has(s.id) ? { ...s, status: 'claimed', claimedBy: currentUserId, claimedAt } : s))
    );
    setNotifs((prev) => [
      {
        id: uid(),
        type: 'claimed',
        aboutShiftIds: updatedShifts.map((s) => s.id),
        groupId: updatedShifts[0].groupId,
        byCoachId: currentUserId,
        at: claimedAt,
      },
      ...prev,
    ]);
    setModal({
      type: 'email-preview',
      subtype: 'claimed',
      shift: updatedShifts[0],
      emails: buildClaimedEmails(updatedShifts, currentUserId),
    });
  };

  const cancelOwnShift = (shiftOrShifts) => {
    const toCancel = Array.isArray(shiftOrShifts) ? shiftOrShifts : [shiftOrShifts];
    const idSet = new Set(toCancel.map((s) => s.id));
    setShifts((prev) => prev.filter((s) => !idSet.has(s.id)));
    setNotifs((prev) => [
      {
        id: uid(),
        type: 'cancelled',
        aboutShiftIds: [...idSet],
        groupId: toCancel[0].groupId,
        byCoachId: currentUserId,
        at: new Date().toISOString(),
      },
      ...prev.filter((n) => !(n.type === 'posted' && n.aboutShiftIds?.some((id) => idSet.has(id)))),
    ]);
    setModal(null);
  };

  // ---- Derived
  const activeShifts = useMemo(
    () => shifts.filter((s) => !isPast(s.date, s.time))
                .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)),
    [shifts]
  );
  const openShiftsNotMine = useMemo(
    () => activeShifts.filter((s) => s.status === 'open' && s.postedBy !== currentUserId),
    [activeShifts, currentUserId]
  );
  const myOpen = useMemo(
    () => activeShifts.filter((s) => s.postedBy === currentUserId),
    [activeShifts, currentUserId]
  );
  const myCoverage = useMemo(
    () => activeShifts.filter((s) => s.claimedBy === currentUserId),
    [activeShifts, currentUserId]
  );

  if (loading) return <LoadingScreen />;

  return (
    <div style={styles.root}>
      <FontsAndGlobals />

      <TopBar
        currentUser={currentUser}
        hasDualRole={hasDualRole}
        viewAs={viewAs}
        onChangeView={setViewAs}
        onSwitch={() => setPersona(true)}
        onInfo={() => setIntroOpen(true)}
      />

      <main style={styles.main}>
        {isManager ? (
          <ManagerView
            shifts={shifts}
            notifs={notifs}
            setModal={setModal}
          />
        ) : (
          <CoachView
            currentUser={currentUser}
            openShifts={openShiftsNotMine}
            myOpen={myOpen}
            myCoverage={myCoverage}
            allShifts={shifts}
            setModal={setModal}
          />
        )}
      </main>

      <Footer onReset={() => setModal({ type: 'reset-confirm' })} />

      {/* --- Modals --- */}
      {personaOpen && (
        <PersonaSwitcher
          current={currentUserId}
          onSelect={(id) => {
            const user = coachById(id);
            // Default dual-role users to coach view since that's their daily use
            setViewAs(user?.role?.includes('coach') ? 'coach' : 'manager');
            setCurrent(id);
            setPersona(false);
          }}
          onClose={() => setPersona(false)}
        />
      )}
      {introOpen && (
        <IntroModal onClose={dismissIntro} />
      )}
      {modal?.type === 'post-shift' && (
        <PostShiftModal
          onClose={() => setModal(null)}
          onSubmit={postShift}
        />
      )}
      {modal?.type === 'confirm-claim' && (
        <ConfirmClaimModal
          shifts={modal.shifts}
          onClose={() => setModal(null)}
          onConfirm={(selected) => claimShift(selected)}
        />
      )}
      {modal?.type === 'confirm-cancel' && (
        <ConfirmCancelModal
          shifts={modal.shifts}
          onClose={() => setModal(null)}
          onConfirm={(toCancel) => cancelOwnShift(toCancel)}
        />
      )}
      {modal?.type === 'email-preview' && (
        <EmailPreviewModal
          subtype={modal.subtype}
          shift={modal.shift}
          emails={modal.emails}
          onClose={() => setModal(null)}
        />
      )}
      {modal?.type === 'reset-confirm' && (
        <ResetModal onClose={() => setModal(null)} onConfirm={resetDemo} />
      )}
    </div>
  );
}

function buildPostedEmails(shifts) {
  // `shifts` is an array; renders as a single summary email regardless of count
  const first = shifts[0];
  const poster = coachById(first.postedBy);
  const managers = COACHES.filter((c) => c.role.includes('manager'));
  const managerEmails = managers.map((m) => m.email).join(', ');
  const managerFirstNames = managers.map((m) => m.name.split(' ')[0]).join(' & ');
  const reason = first.reason;
  const n = shifts.length;
  const isBulk = n > 1;

  // Build a vertically-aligned list of the classes
  const lines = shifts.map((s) => {
    const when = `${formatDay(s.date)} · ${s.time}`.padEnd(22);
    return `   ${when}—  ${s.className}`;
  }).join('\n');

  const posterSubject = isBulk
    ? `Coverage requested — ${n} classes`
    : `Coverage request received — ${first.className}, ${formatDay(first.date)} · ${first.time}`;
  const managerSubject = isBulk
    ? `${n} new open shifts — ${poster.name}`
    : `NEW open shift — ${poster.name}, ${first.className}`;

  const reasonLine = reason ? `\n   REASON  ${reason}\n` : '\n';

  return [
    {
      to: poster,
      tag: 'TO POSTER',
      toDisplay: poster.email,
      subject: posterSubject,
      body: isBulk
        ? `Hi ${poster.name.split(' ')[0]},\n\nYour coverage requests are live. Other coaches can now claim them.\n\n${lines}\n${reasonLine}\nYou'll receive a confirmation email each time a coach picks one up.`
        : `Hi ${poster.name.split(' ')[0]},\n\nYour coverage request is live. Other coaches can now claim it.\n\n${lines}\n${reasonLine}\nYou'll receive a confirmation email the moment a coach picks it up.`,
    },
    {
      to: { name: 'Management', email: managerEmails },
      tag: 'TO MANAGEMENT',
      toDisplay: managerEmails,
      subject: managerSubject,
      body: isBulk
        ? `Hi ${managerFirstNames},\n\n${poster.name} has posted ${n} classes that need coverage.\n\n${lines}\n${reasonLine}\nStatus: OPEN. You'll be notified each time a coach claims one.`
        : `Hi ${managerFirstNames},\n\n${poster.name} has posted a class that needs coverage.\n\n${lines}\n${reasonLine}\nStatus: OPEN. You'll be notified when a coach claims it.`,
    },
  ];
}
function buildClaimedEmails(shiftsClaimed, claimerId) {
  // `shiftsClaimed` is an array of shifts the claimer just covered. All come from the same group.
  const first = shiftsClaimed[0];
  const poster  = coachById(first.postedBy);
  const claimer = coachById(claimerId);
  const managers = COACHES.filter((c) => c.role.includes('manager'));
  const managerEmails = managers.map((m) => m.email).join(', ');
  const managerFirstNames = managers.map((m) => m.name.split(' ')[0]).join(' & ');

  const n = shiftsClaimed.length;
  const isBulk = n > 1;
  const lines = shiftsClaimed
    .map((s) => `   ${formatDay(s.date)} · ${s.time}  —  ${s.className}`)
    .join('\n');

  const firstWhen = `${formatDay(first.date)} · ${first.time}`;

  return [
    {
      to: claimer,
      tag: 'TO YOU (coverer)',
      toDisplay: claimer.email,
      subject: isBulk
        ? `Confirmed: you're covering ${n} classes for ${poster.name}`
        : `Confirmed: you're covering ${first.className}, ${firstWhen}`,
      body: isBulk
        ? `Hi ${claimer.name.split(' ')[0]},\n\nYou've confirmed coverage for the following classes originally posted by ${poster.name}. Thanks for stepping up.\n\n${lines}\n\nIf anything changes, let the box manager know immediately.`
        : `Hi ${claimer.name.split(' ')[0]},\n\nYou've confirmed coverage for the class below. Thanks for stepping up.\n\n   CLASS     ${first.className}\n   WHEN      ${firstWhen}\n   ORIGINAL  ${poster.name}\n\nIf something changes, let the box manager know immediately.`,
    },
    {
      to: poster,
      tag: 'TO POSTER',
      toDisplay: poster.email,
      subject: isBulk
        ? `${claimer.name} has covered ${n} of your classes`
        : `Your shift is covered — ${first.className}, ${firstWhen}`,
      body: isBulk
        ? `Hi ${poster.name.split(' ')[0]},\n\nGood news — ${claimer.name} has picked up ${n} of the classes from your request:\n\n${lines}\n\nA thank-you to ${claimer.name.split(' ')[0]} is always a nice touch.`
        : `Hi ${poster.name.split(' ')[0]},\n\nGood news — ${claimer.name} has picked up your class.\n\n   CLASS    ${first.className}\n   WHEN     ${firstWhen}\n   COVER    ${claimer.name}\n\nA thank-you to ${claimer.name.split(' ')[0]} is always a nice touch.`,
    },
    {
      to: { name: 'Management', email: managerEmails },
      tag: 'TO MANAGEMENT',
      toDisplay: managerEmails,
      subject: isBulk
        ? `${claimer.name} covers ${n} classes for ${poster.name}`
        : `Coverage confirmed — ${claimer.name} covers ${poster.name}`,
      body: isBulk
        ? `Hi ${managerFirstNames},\n\n${claimer.name} has picked up ${n} classes from ${poster.name}'s request:\n\n${lines}\n\nNo action needed — logged for your records.`
        : `Hi ${managerFirstNames},\n\nA coverage swap has been confirmed.\n\n   CLASS     ${first.className}\n   WHEN      ${firstWhen}\n   ORIGINAL  ${poster.name}\n   COVER     ${claimer.name}\n\nNo action needed — logged for your records.`,
    },
  ];
}

// ----------------------------------------------------------------
// Calendar view (shared between coach & manager dashboards)
// ----------------------------------------------------------------
function CalendarView({ shifts, currentUserId, variant, onClaim, onCancel }) {
  // variant: 'coach' | 'manager' — manager view hides Cover/Cancel actions
  const today = new Date();
  const todayISO = dateToISO(today);

  const [year, setYear]   = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(todayISO);

  const prev = () => {
    if (month === 0) { setYear(year - 1); setMonth(11); } else setMonth(month - 1);
  };
  const next = () => {
    if (month === 11) { setYear(year + 1); setMonth(0); } else setMonth(month + 1);
  };
  const jumpToToday = () => {
    setYear(today.getFullYear());
    setMonth(today.getMonth());
    setSelectedDate(todayISO);
  };

  // Group all shifts by date for fast cell lookup
  const shiftsByDate = useMemo(() => {
    const m = new Map();
    for (const s of shifts) {
      if (!m.has(s.date)) m.set(s.date, []);
      m.get(s.date).push(s);
    }
    return m;
  }, [shifts]);

  // Build 6-week month grid (42 cells), starting from Monday
  const firstDay = new Date(year, month, 1);
  const firstWeekday = firstDay.getDay(); // 0=Sun..6=Sat
  const offset = firstWeekday === 0 ? 6 : firstWeekday - 1;

  const cells = [];
  for (let i = -offset; i < 42 - offset; i++) {
    cells.push(new Date(year, month, 1 + i));
  }

  const monthLabel = firstDay.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const weekdayLabels = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

  // Compute selected day's shifts (sorted by time)
  const selectedShifts = (shiftsByDate.get(selectedDate) || [])
    .slice()
    .sort((a, b) => a.time.localeCompare(b.time));

  return (
    <div>
      {/* Calendar header with month nav */}
      <div style={styles.calHeader}>
        <button onClick={prev} style={styles.calNavBtn} title="Previous month">‹</button>
        <div style={styles.calTitle}>{monthLabel}</div>
        <button onClick={next} style={styles.calNavBtn} title="Next month">›</button>
        <button onClick={jumpToToday} style={styles.calTodayBtn}>Today</button>
      </div>

      {/* Weekday labels */}
      <div style={styles.calWeekdayRow}>
        {weekdayLabels.map((d, i) => (
          <div key={i} style={styles.calWeekdayLabel}>{d}</div>
        ))}
      </div>

      {/* Day grid */}
      <div style={styles.calGrid}>
        {cells.map((d) => {
          const iso = dateToISO(d);
          const inMonth   = d.getMonth() === month;
          const isToday   = iso === todayISO;
          const isSelected = iso === selectedDate;
          const dayShifts = shiftsByDate.get(iso) || [];
          const open      = dayShifts.filter((s) => s.status === 'open').length;
          const covered   = dayShifts.filter((s) => s.status === 'claimed').length;
          const cellStyle = {
            ...styles.calCell,
            ...(!inMonth ? styles.calCellOutMonth : {}),
            ...(isSelected ? styles.calCellSelected : {}),
          };
          return (
            <button
              key={iso}
              onClick={() => setSelectedDate(iso)}
              style={cellStyle}
            >
              <div style={{
                ...styles.calDayNum,
                ...(isSelected ? { color: '#ece7da' } : {}),
                ...(isToday && !isSelected ? styles.calDayNumToday : {}),
              }}>
                {d.getDate()}
              </div>
              <div style={styles.calDayIndicators}>
                {open > 0 && (
                  <span style={{
                    ...styles.calBadge,
                    background: '#c03434', color: '#fff',
                  }}>{open}</span>
                )}
                {covered > 0 && (
                  <span style={{
                    ...styles.calBadge,
                    background: '#1d6b48', color: '#fff',
                  }}>{covered}</span>
                )}
              </div>
            </button>
          );
        })}
      </div>

      {/* Selected day's details */}
      <DayDetails
        date={selectedDate}
        shifts={selectedShifts}
        allShifts={shifts}
        currentUserId={currentUserId}
        variant={variant}
        onClaim={onClaim}
        onCancel={onCancel}
      />
    </div>
  );
}

function DayDetails({ date, shifts, allShifts, currentUserId, variant, onClaim, onCancel }) {
  const formatted = new Date(date + 'T00:00:00').toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long',
  });
  const isEmpty = shifts.length === 0;

  return (
    <div style={styles.dayDetails}>
      <div style={styles.dayDetailsHeader}>
        <span style={styles.dayDetailsDate}>{formatted}</span>
        {!isEmpty && (
          <span style={styles.dayDetailsCount}>
            {shifts.length} {shifts.length === 1 ? 'class' : 'classes'}
          </span>
        )}
      </div>
      {isEmpty ? (
        <div style={styles.dayDetailsEmpty}>
          <div style={styles.emptyDash} />
          <span>No classes scheduled for this day.</span>
        </div>
      ) : (
        <ul style={styles.dayShiftList}>
          {shifts.map((s) => {
            const poster  = coachById(s.postedBy);
            const claimer = s.claimedBy ? coachById(s.claimedBy) : null;
            const isMine  = s.postedBy === currentUserId;
            const past    = isPast(s.date, s.time);
            const isOpen  = s.status === 'open' && !past;
            const statusColor = past ? '#87837b' : s.status === 'open' ? '#c03434' : '#1d6b48';

            // Actions only in coach variant; claim passes the full group so the multi-select
            // modal opens with all open siblings selectable. Use (groupId || id) as the group
            // key so undefined can never false-match across unrelated shifts.
            const groupKey  = s.groupId || s.id;
            const groupOpen = allShifts.filter(
              (x) =>
                (x.groupId || x.id) === groupKey &&
                x.status === 'open' &&
                !isPast(x.date, x.time)
            );
            const canClaim  = variant === 'coach' && isOpen && !isMine;
            const canCancel = variant === 'coach' && isOpen && isMine;

            return (
              <li key={s.id} style={styles.dayShiftRow}>
                <span style={{ ...styles.dayShiftDot, background: statusColor }} />
                <span style={styles.dayShiftTime}>{s.time}</span>
                <span style={styles.dayShiftClass}>{s.className}</span>
                <span style={styles.dayShiftPeople}>
                  <Avatar coach={poster} size={18} />
                  <span style={styles.dayShiftName}>{poster.name}</span>
                  {claimer && (
                    <>
                      <ArrowRight size={11} style={{ color: '#87837b', flexShrink: 0 }} />
                      <Avatar coach={claimer} size={18} />
                      <span style={styles.dayShiftName}>{claimer.name}</span>
                    </>
                  )}
                </span>
                {canClaim && (
                  <button onClick={() => onClaim(groupOpen)} style={styles.dayShiftBtnClaim}>
                    <Check size={12} strokeWidth={3} /> Cover
                  </button>
                )}
                {canCancel && (
                  <button onClick={() => onCancel(groupOpen)} style={styles.dayShiftBtnCancel}>
                    <X size={12} /> Cancel
                  </button>
                )}
                {past && !canClaim && !canCancel && (
                  <span style={styles.dayShiftStatusText}>past</span>
                )}
              </li>
            );
          })}
        </ul>
      )}
    </div>
  );
}

  const filtered =

    filter === 'open'    ? openAll.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)) :

              { id: 'open',    label: 'Open',        n: openAll.length },

                  {n.type === 'claimed' && (count > 1
                    ? <>claimed <em>{count} classes</em> starting {formatDay(firstShift.date)} · {firstShift.time}</>
                    : <>claimed <em>{firstShift.className}</em> on {formatDay(firstShift.date)} · {firstShift.time}</>)}
                  {n.type === 'cancelled' && (count > 1
                    ? <>cancelled a request for <em>{count} classes</em></>
                    : <>cancelled their request for <em>{firstShift.className}</em></>)}
                </div>
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

function ShiftCard({ group, variant, currentUserId, onClaim, onCancel }) {
  // `group` is always an array of shifts sharing a groupId (size 1 or more)
  const shifts = group;
  const first = shifts[0];
  const isGroup = shifts.length > 1;
  const poster = coachById(first.postedBy);

  const openShifts    = shifts.filter((s) => s.status === 'open' && !isPast(s.date, s.time));
  const claimedShifts = shifts.filter((s) => s.status === 'claimed');
  const pastShifts    = shifts.filter((s) => isPast(s.date, s.time));
  const isMine        = first.postedBy === currentUserId;
  const anyUrgent     = openShifts.some((s) => hoursUntil(s.date, s.time) < 48);
  const allPast       = pastShifts.length === shifts.length;
  const allClaimed    = claimedShifts.length === shifts.length;
  const allOpen       = openShifts.length === shifts.length;

  const statusColor =
    allPast ? '#87837b' :
    allOpen ? '#c03434' :
    allClaimed ? '#1d6b48' :
    '#c29536'; // partial — amber
  const statusLabel =
    allPast ? 'PAST' :
    allOpen ? (anyUrgent ? 'URGENT · OPEN' : 'OPEN') :
    allClaimed ? 'COVERED' :
    `${claimedShifts.length}/${shifts.length} COVERED`;

  // Action area depends on variant and state
  const canClaim  = variant === 'open-other' && openShifts.length > 0;
  const canCancel = variant === 'mine' && openShifts.length > 0;

  return (
    <article
      style={{
        ...styles.card,
        borderLeft: `4px solid ${statusColor}`,
        opacity: allPast ? 0.6 : 1,
      }}
    >
      <div style={styles.cardMain}>
        <div style={styles.cardTop}>
          <div style={styles.cardClass}>
            {isGroup
              ? `${shifts.length} classes · ${groupClassSummary(shifts)}`
              : first.className}
          </div>
          <div style={{ ...styles.statusTag, color: statusColor, borderColor: statusColor }}>
            {statusLabel}
          </div>
        </div>

        {/* Single-shift: show date/time inline. Group: render per-shift list below */}
        {!isGroup ? (
          <div style={styles.cardMeta}>
            <span style={styles.metaItem}><Calendar size={13} /> {formatDay(first.date)}</span>
            <span style={styles.metaItem}><Clock size={13} /> {first.time}</span>
          </div>
        ) : (
          <div style={styles.cardMeta}>
            <span style={styles.metaItem}>
              <Calendar size={13} /> {groupDateRange(shifts)}
            </span>
          </div>
        )}

        <div style={styles.cardPeople}>
          <div style={styles.personLine}>
            <Avatar coach={poster} size={22} />
            <div style={styles.personText}>
              <span style={styles.personLabel}>Posted by</span>
              <span style={styles.personName}>{poster.name}</span>
            </div>
          </div>
          {!isGroup && first.claimedBy && (
            <>
              <ArrowRight size={14} style={{ color: '#87837b', flexShrink: 0 }} />
              <div style={styles.personLine}>
                <Avatar coach={coachById(first.claimedBy)} size={22} />
                <div style={styles.personText}>
                  <span style={styles.personLabel}>Covered by</span>
                  <span style={styles.personName}>{coachById(first.claimedBy).name}</span>
                </div>
              </div>
            </>
          )}
        </div>

        {first.reason && (
          <div style={styles.cardReason}>
            <span style={styles.reasonLabel}>REASON</span> {first.reason}
          </div>
        )}

        {isGroup && (
          <ul style={styles.subShiftList}>
            {shifts.map((s) => {
              const claimer = s.claimedBy ? coachById(s.claimedBy) : null;
              const dotColor = isPast(s.date, s.time) ? '#87837b' : s.status === 'open' ? '#c03434' : '#1d6b48';
              return (
                <li key={s.id} style={styles.subShiftRow}>
                  <span style={{ ...styles.subShiftDot, background: dotColor }} />
                  <span style={styles.subShiftWhen}>{formatDay(s.date)} · {s.time}</span>
                  <span style={styles.subShiftClass}>{s.className}</span>
                  <span style={styles.subShiftStatus}>
                    {isPast(s.date, s.time)
                      ? 'past'
                      : s.status === 'open'
                        ? 'open'
                        : <>covered by <strong>{claimer?.name}</strong></>}
                  </span>
                </li>
              );
            })}
          </ul>
        )}
      </div>

      {(canClaim || canCancel) && (
        <div style={styles.cardAction}>
          {canClaim && (
            <button onClick={() => onClaim(shifts)} style={styles.claimBtn}>
              <Check size={14} strokeWidth={3} />{' '}
              {isGroup
                ? `COVER 1 OR MORE (${openShifts.length} OPEN)`
                : "I'LL COVER IT"}
            </button>
          )}
          {canCancel && (
            <button onClick={() => onCancel(openShifts)} style={styles.cancelBtn}>
              <X size={14} />{' '}
              {openShifts.length > 1 ? `Cancel ${openShifts.length} open` : 'Cancel request'}
            </button>
          )}
        </div>
      )}
    </article>
  );
}

// Helpers for group summaries
function groupClassSummary(shifts) {
  const unique = [...new Set(shifts.map((s) => s.className))];
  if (unique.length === 1) return unique[0];
  if (unique.length === 2) return unique.join(' + ');
  return `${unique.length} class types`;
}
function groupDateRange(shifts) {
  const dates = [...new Set(shifts.map((s) => s.date))].sort();
  if (dates.length === 1) return formatDay(dates[0]);
  return `${formatDay(dates[0])} → ${formatDay(dates[dates.length - 1])}`;
}

function PostShiftModal({ onClose, onSubmit }) {
  const [entries, setEntries] = useState([
    { id: uid(), date: isoDay(1), time: '18:00', className: CLASS_TYPES[0], shifts: 1 },
  ]);
  const [reason, setReason] = useState('');

  const updateEntry = (id, patch) =>
    setEntries((prev) => prev.map((e) => (e.id === id ? { ...e, ...patch } : e)));

  const addEntry = () => {
    // New entry defaults to the day after the last row, same time & class
    const last = entries[entries.length - 1];
    const nextDate = last ? shiftDateISO(last.date, 1) : isoDay(1);
    setEntries((prev) => [
      ...prev,
      { id: uid(), date: nextDate, time: last?.time ?? '18:00', className: last?.className ?? CLASS_TYPES[0], shifts: 1 },
    ]);
  };

  const removeEntry = (id) => {
    if (entries.length === 1) return;
    setEntries((prev) => prev.filter((e) => e.id !== id));
  };

  const submit = () => {
    const clean = entries.filter((e) => e.date && e.time && e.className);
    if (clean.length === 0) return;
    onSubmit(clean.map(({ id, ...rest }) => ({ ...rest, reason })));
  };

  // Total shifts across all rows (accounting for the back-to-back multiplier on each row)
  const totalShifts = entries.reduce(
    (acc, e) => acc + Math.max(1, Math.min(6, Number(e.shifts) || 1)),
    0
  );

  return (
    <ModalShell onClose={onClose} maxWidth={640}>
      <div style={styles.modalHeader}>
        <h3 style={styles.modalTitle}>REQUEST COVERAGE</h3>
        <button onClick={onClose} style={styles.closeBtn}><X size={18} /></button>
      </div>
      <p style={styles.modalIntro}>
        Add the classes you need covered. Teaching back-to-back hours?
        Set <strong>Shifts</strong> to <strong>2–6</strong> on a row to mean "N classes in a row starting at this time".
        Everything you post here goes out as <strong>one request</strong>.
      </p>

      <div style={styles.entriesList}>
        {entries.map((entry, idx) => {
          const count = Math.max(1, Math.min(6, Number(entry.shifts) || 1));
          const preview = count > 1
            ? Array.from({ length: count }, (_, i) => addHoursToTime(entry.time, i)).join(' · ')
            : null;
          return (
            <div key={entry.id} style={styles.entryRow}>
              <div style={styles.entryIndex}>{String(idx + 1).padStart(2, '0')}</div>
              <div style={{ flex: 1 }}>
                <div style={styles.entryFields}>
                  <Field label="Date">
                    <input
                      type="date"
                      value={entry.date}
                      onChange={(e) => updateEntry(entry.id, { date: e.target.value })}
                      style={styles.input}
                      min={isoDay(0)}
                    />
                  </Field>
                  <Field label="Time">
                    <input
                      type="time"
                      value={entry.time}
                      onChange={(e) => updateEntry(entry.id, { time: e.target.value })}
                      style={styles.input}
                    />
                  </Field>
                  <Field label="Shifts">
                    <select
                      value={entry.shifts}
                      onChange={(e) => updateEntry(entry.id, { shifts: Number(e.target.value) })}
                      style={styles.input}
                    >
                      <option value={1}>1</option>
                      <option value={2}>2</option>
                      <option value={3}>3</option>
                      <option value={4}>4</option>
                      <option value={5}>5</option>
                      <option value={6}>6</option>
                    </select>
                  </Field>
                  <Field label="Class">
                    <select
                      value={entry.className}
                      onChange={(e) => updateEntry(entry.id, { className: e.target.value })}
                      style={styles.input}
                    >
                      {CLASS_TYPES.map((c) => <option key={c}>{c}</option>)}
                    </select>
                  </Field>
                </div>
                {preview && (
                  <div style={styles.entryPreview}>
                    → {count} back-to-back classes: {preview}
                  </div>
                )}
              </div>
              {entries.length > 1 && (
                <button
                  onClick={() => removeEntry(entry.id)}
                  style={styles.removeEntryBtn}
                  title="Remove this row"
                >
                  <X size={14} />
                </button>
              )}
            </div>
          );
        })}
      </div>

      <button onClick={addEntry} style={styles.addEntryBtn}>
        <Plus size={14} strokeWidth={3} /> Add another class
      </button>

      <Field label={totalShifts > 1 ? 'Reason (applies to all classes in this request)' : 'Reason (optional)'}>
        <textarea
          value={reason}
          onChange={(e) => setReason(e.target.value)}
          placeholder={totalShifts > 1 ? 'e.g. Away on holiday from 27 Apr – 3 May' : 'Medical appointment, family commitment, etc.'}
          style={{ ...styles.input, minHeight: 70, resize: 'vertical', fontFamily: 'Archivo, sans-serif' }}
        />
      </Field>

      <div style={styles.modalActions}>
        <button onClick={onClose} style={styles.secondaryBtn}>Cancel</button>
        <button onClick={submit} style={styles.primaryBtn}>
          <Plus size={14} strokeWidth={3} />{' '}
          {totalShifts > 1 ? `Post request (${totalShifts} classes)` : 'Post request'}
        </button>
      </div>
    </ModalShell>
  );
}

function ConfirmClaimModal({ shifts, onClose, onConfirm }) {
  // `shifts` is the array of OPEN shifts from the group the user clicked "Cover" on.
  // Sort them chronologically so the checklist is predictable.
  const sortedShifts = [...shifts].sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  const isGroup = sortedShifts.length > 1;
  const poster = coachById(sortedShifts[0].postedBy);

  // Track which shift IDs are selected. Default: all of them.
  const [selected, setSelected] = useState(() => new Set(sortedShifts.map((s) => s.id)));

  const toggle = (id) => {
    setSelected((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };
  const selectAll = () => setSelected(new Set(sortedShifts.map((s) => s.id)));
  const selectNone = () => setSelected(new Set());

  const selectedShifts = sortedShifts.filter((s) => selected.has(s.id));
  const canConfirm = selectedShifts.length > 0;

  if (!isGroup) {
    // Simple single-shift confirmation (original flow)
    const shift = sortedShifts[0];
    return (
      <ModalShell onClose={onClose} maxWidth={460}>
        <div style={styles.modalHeader}>
          <h3 style={styles.modalTitle}>CONFIRM COVERAGE</h3>
          <button onClick={onClose} style={styles.closeBtn}><X size={18} /></button>
        </div>
        <p style={styles.modalIntro}>
          You're about to take over this class. Three emails go out the moment you confirm.
        </p>
        <div style={styles.confirmBox}>
          <div style={styles.confirmRow}><span>CLASS</span><strong>{shift.className}</strong></div>
          <div style={styles.confirmRow}><span>WHEN</span><strong>{formatDay(shift.date)} · {shift.time}</strong></div>
          <div style={styles.confirmRow}><span>ORIGINAL</span><strong>{poster.name}</strong></div>
        </div>
        <div style={styles.modalActions}>
          <button onClick={onClose} style={styles.secondaryBtn}>Back</button>
          <button onClick={() => onConfirm(sortedShifts)} style={styles.primaryBtn}>
            <Check size={14} strokeWidth={3} /> Yes, I'll cover it
          </button>
        </div>
      </ModalShell>
    );
  }

  // Multi-select variant
  return (
    <ModalShell onClose={onClose} maxWidth={540}>
      <div style={styles.modalHeader}>
        <h3 style={styles.modalTitle}>PICK CLASSES TO COVER</h3>
        <button onClick={onClose} style={styles.closeBtn}><X size={18} /></button>
      </div>
      <p style={styles.modalIntro}>
        <strong>{poster.name}</strong> posted {sortedShifts.length} open classes as one request.
        Tick the ones you can cover — all, some, or just one.
      </p>

      <div style={styles.claimSelectToolbar}>
        <span style={styles.claimSelectCount}>
          {selectedShifts.length} of {sortedShifts.length} selected
        </span>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={selectAll}  style={styles.smallBtn}>All</button>
          <button onClick={selectNone} style={styles.smallBtn}>None</button>
        </div>
      </div>

      <div style={styles.claimSelectList}>
        {sortedShifts.map((s) => {
          const isOn = selected.has(s.id);
          return (
            <button
              key={s.id}
              onClick={() => toggle(s.id)}
              style={{
                ...styles.claimSelectRow,
                ...(isOn ? styles.claimSelectRowActive : {}),
              }}
            >
              <span style={styles.claimSelectBox}>
                {isOn && <Check size={12} strokeWidth={4} />}
              </span>
              <span style={styles.claimSelectWhen}>
                {formatDay(s.date)} · {s.time}
              </span>
              <span style={styles.claimSelectClass}>{s.className}</span>
            </button>
          );
        })}
      </div>

      <div style={styles.modalActions}>
        <button onClick={onClose} style={styles.secondaryBtn}>Back</button>
        <button
          onClick={() => onConfirm(selectedShifts)}
          style={{ ...styles.primaryBtn, opacity: canConfirm ? 1 : 0.5 }}
          disabled={!canConfirm}
        >
          <Check size={14} strokeWidth={3} />{' '}
          {selectedShifts.length === sortedShifts.length
            ? `Cover all ${sortedShifts.length}`
            : `Cover ${selectedShifts.length} of ${sortedShifts.length}`}
        </button>
      </div>
    </ModalShell>
  );
}

      <div style={styles.modalActions}>
        <button onClick={onClose} style={styles.secondaryBtn}>Keep data</button>
        <button onClick={onConfirm} style={styles.dangerBtn}>
          <RotateCcw size={14} /> Reset everything
        </button>
      </div>
    </ModalShell>
  );
}
