// --- localStorage-backed shim for window.storage ---
// Matches the API used by Claude artifacts so the rest of the code is unchanged.
window.storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v !== null ? { key, value: v, shared: false } : null;
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix, shared: false };
  },
};

// ----------------------------------------------------------------
// Helpers
// ----------------------------------------------------------------
const uid = () => Math.random().toString(36).slice(2, 10);
const coachById = (id) => COACHES.find((c) => c.id === id);

const formatDay = (iso) => {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
};
const formatRelative = (iso) => {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
};
const hoursUntil = (dateISO, timeStr) => {
  const [h, m] = timeStr.split(':');
  const target = new Date(dateISO + 'T00:00:00');
  target.setHours(parseInt(h, 10), parseInt(m, 10), 0, 0);
  return (target.getTime() - Date.now()) / 3600000;
};
const isPast = (dateISO, timeStr) => hoursUntil(dateISO, timeStr) < 0;

// ----------------------------------------------------------------
// Main App
// ----------------------------------------------------------------
function App() {
  const [loading, setLoading]       = useState(true);
  const [currentUserId, setCurrent] = useState('c2');
  const [viewAs, setViewAs]         = useState('coach'); // 'coach' | 'manager' — for dual-role users
  const [shifts, setShifts]         = useState([]);
  const [notifs, setNotifs]         = useState([]);
  const [modal, setModal]           = useState(null);
  const [introOpen, setIntroOpen]   = useState(false);
  const [personaOpen, setPersona]   = useState(false);

  const currentUser = coachById(currentUserId);
  const hasDualRole = (currentUser?.role?.length ?? 0) > 1;
  const isManager   = currentUser?.role?.includes('manager') && (hasDualRole ? viewAs === 'manager' : true);

  // ---- Storage load
  useEffect(() => {
    (async () => {
      try {
        const s = await window.storage.get('cover_shifts');
        setShifts(s ? JSON.parse(s.value) : SEED_SHIFTS);
      } catch { setShifts(SEED_SHIFTS); }
      try {
        const n = await window.storage.get('cover_notifs');
        setNotifs(n ? JSON.parse(n.value) : SEED_NOTIFS);
      } catch { setNotifs(SEED_NOTIFS); }
      try {
        const intro = await window.storage.get('cover_intro_dismissed');
        setIntroOpen(!intro);
      } catch { setIntroOpen(true); }
      setLoading(false);
    })();
  }, []);

  // ---- Storage save
  useEffect(() => {
    if (loading) return;
    window.storage.set('cover_shifts', JSON.stringify(shifts)).catch(() => {});
  }, [shifts, loading]);
  useEffect(() => {
    if (loading) return;
    window.storage.set('cover_notifs', JSON.stringify(notifs)).catch(() => {});
  }, [notifs, loading]);

  const dismissIntro = () => {
    setIntroOpen(false);
    window.storage.set('cover_intro_dismissed', '1').catch(() => {});
  };

  const resetDemo = async () => {
    try {
      await window.storage.set('cover_shifts', JSON.stringify(SEED_SHIFTS));
      await window.storage.set('cover_notifs', JSON.stringify(SEED_NOTIFS));
    } catch {}
    setShifts(SEED_SHIFTS);
    setNotifs(SEED_NOTIFS);
    setModal(null);
  };

  // ---- Actions
  const postShift = (data) => {
    const shift = {
      id: uid(),
      postedBy: currentUserId,
      date: data.date,
      time: data.time,
      className: data.className,
      reason: data.reason,
      status: 'open',
      claimedBy: null,
      claimedAt: null,
      createdAt: new Date().toISOString(),
    };
    setShifts((prev) => [shift, ...prev]);
    setNotifs((prev) => [
      { id: uid(), type: 'posted', aboutShiftId: shift.id, byCoachId: currentUserId, at: shift.createdAt },
      ...prev,
    ]);
    setModal({
      type: 'email-preview',
      subtype: 'posted',
      shift,
      emails: buildPostedEmails(shift),
    });
  };

  const claimShift = (shift) => {
    const claimedAt = new Date().toISOString();
    const updated = { ...shift, status: 'claimed', claimedBy: currentUserId, claimedAt };
    setShifts((prev) => prev.map((s) => (s.id === shift.id ? updated : s)));
    setNotifs((prev) => [
      { id: uid(), type: 'claimed', aboutShiftId: shift.id, byCoachId: currentUserId, at: claimedAt },
      ...prev,
    ]);
    setModal({
      type: 'email-preview',
      subtype: 'claimed',
      shift: updated,
      emails: buildClaimedEmails(updated, currentUserId),
    });
  };

  const cancelOwnShift = (shift) => {
    setShifts((prev) => prev.filter((s) => s.id !== shift.id));
    setNotifs((prev) => [
      { id: uid(), type: 'cancelled', aboutShiftId: shift.id, byCoachId: currentUserId, at: new Date().toISOString() },
      ...prev.filter((n) => n.aboutShiftId !== shift.id || n.type !== 'posted'),
    ]);
    setModal(null);
  };

  // ---- Derived
  const activeShifts = useMemo(
    () => shifts.filter((s) => !isPast(s.date, s.time))
                .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)),
    [shifts]
  );
  const openShiftsNotMine = useMemo(
    () => activeShifts.filter((s) => s.status === 'open' && s.postedBy !== currentUserId),
    [activeShifts, currentUserId]
  );
  const myOpen = useMemo(
    () => activeShifts.filter((s) => s.postedBy === currentUserId),
    [activeShifts, currentUserId]
  );
  const myCoverage = useMemo(
    () => activeShifts.filter((s) => s.claimedBy === currentUserId),
    [activeShifts, currentUserId]
  );

  if (loading) return <LoadingScreen />;

  return (
    <div style={styles.root}>
      <FontsAndGlobals />

      <TopBar
        currentUser={currentUser}
        hasDualRole={hasDualRole}
        viewAs={viewAs}
        onChangeView={setViewAs}
        onSwitch={() => setPersona(true)}
        onInfo={() => setIntroOpen(true)}
      />

      <main style={styles.main}>
        {isManager ? (
          <ManagerView
            shifts={shifts}
            notifs={notifs}
            setModal={setModal}
          />
        ) : (
          <CoachView
            currentUser={currentUser}
            openShifts={openShiftsNotMine}
            myOpen={myOpen}
            myCoverage={myCoverage}
            setModal={setModal}
          />
        )}
      </main>

      <Footer onReset={() => setModal({ type: 'reset-confirm' })} />

      {/* --- Modals --- */}
      {personaOpen && (
        <PersonaSwitcher
          current={currentUserId}
          onSelect={(id) => {
            const user = coachById(id);
            // Default dual-role users to coach view since that's their daily use
            setViewAs(user?.role?.includes('coach') ? 'coach' : 'manager');
            setCurrent(id);
            setPersona(false);
          }}
          onClose={() => setPersona(false)}
        />
      )}
      {introOpen && (
        <IntroModal onClose={dismissIntro} />
      )}
      {modal?.type === 'post-shift' && (
        <PostShiftModal
          onClose={() => setModal(null)}
          onSubmit={postShift}
        />
      )}
      {modal?.type === 'confirm-claim' && (
        <ConfirmClaimModal
          shift={modal.shift}
          onClose={() => setModal(null)}
          onConfirm={() => claimShift(modal.shift)}
        />
      )}
      {modal?.type === 'confirm-cancel' && (
        <ConfirmCancelModal
          shift={modal.shift}
          onClose={() => setModal(null)}
          onConfirm={() => cancelOwnShift(modal.shift)}
        />
      )}
      {modal?.type === 'email-preview' && (
        <EmailPreviewModal
          subtype={modal.subtype}
          shift={modal.shift}
          emails={modal.emails}
          onClose={() => setModal(null)}
        />
      )}
      {modal?.type === 'reset-confirm' && (
        <ResetModal onClose={() => setModal(null)} onConfirm={resetDemo} />
      )}
    </div>
  );
}

// ----------------------------------------------------------------
// Email content builders
// ----------------------------------------------------------------
function buildPostedEmails(shift) {
  const poster = coachById(shift.postedBy);
  const managers = COACHES.filter((c) => c.role.includes('manager'));
  const managerEmails = managers.map((m) => m.email).join(', ');
  const managerFirstNames = managers.map((m) => m.name.split(' ')[0]).join(' & ');
  const when = `${formatDay(shift.date)} · ${shift.time}`;
  return [
    {
      to: poster,
      tag: 'TO POSTER',
      toDisplay: poster.email,
      subject: `Coverage request received — ${shift.className}, ${when}`,
      body: `Hi ${poster.name.split(' ')[0]},\n\nYour coverage request is live. Other coaches can now claim it.\n\n   CLASS   ${shift.className}\n   WHEN    ${when}\n   REASON  ${shift.reason || '—'}\n\nYou'll receive a confirmation email the moment a coach picks it up.`,
    },
    {
      to: { name: 'Management', email: managerEmails },
      tag: 'TO MANAGEMENT',
      toDisplay: managerEmails,
      subject: `NEW open shift — ${poster.name}, ${shift.className}`,
      body: `Hi ${managerFirstNames},\n\n${poster.name} has posted a class that needs coverage.\n\n   COACH   ${poster.name}\n   CLASS   ${shift.className}\n   WHEN    ${when}\n   REASON  ${shift.reason || '—'}\n\nStatus: OPEN. You'll be notified when a coach claims it.`,
    },
  ];
}
function buildClaimedEmails(shift, claimerId) {
  const poster  = coachById(shift.postedBy);
  const claimer = coachById(claimerId);
  const managers = COACHES.filter((c) => c.role.includes('manager'));
  const managerEmails = managers.map((m) => m.email).join(', ');
  const managerFirstNames = managers.map((m) => m.name.split(' ')[0]).join(' & ');
  const when = `${formatDay(shift.date)} · ${shift.time}`;
  return [
    {
      to: claimer,
      tag: 'TO YOU (coverer)',
      toDisplay: claimer.email,
      subject: `Confirmed: you're covering ${shift.className}, ${when}`,
      body: `Hi ${claimer.name.split(' ')[0]},\n\nYou've confirmed coverage for the class below. Thanks for stepping up.\n\n   CLASS     ${shift.className}\n   WHEN      ${when}\n   ORIGINAL  ${poster.name}\n\nIf something changes, let the box manager know immediately.`,
    },
    {
      to: poster,
      tag: 'TO POSTER',
      toDisplay: poster.email,
      subject: `Your shift is covered — ${shift.className}, ${when}`,
      body: `Hi ${poster.name.split(' ')[0]},\n\nGood news — ${claimer.name} has picked up your class.\n\n   CLASS    ${shift.className}\n   WHEN     ${when}\n   COVER    ${claimer.name}\n\nA thank-you to ${claimer.name.split(' ')[0]} is always a nice touch.`,
    },
    {
      to: { name: 'Management', email: managerEmails },
      tag: 'TO MANAGEMENT',
      toDisplay: managerEmails,
      subject: `Coverage confirmed — ${claimer.name} covers ${poster.name}`,
      body: `Hi ${managerFirstNames},\n\nA coverage swap has been confirmed.\n\n   CLASS     ${shift.className}\n   WHEN      ${when}\n   ORIGINAL  ${poster.name}\n   COVER     ${claimer.name}\n\nNo action needed — logged for your records.`,
    },
  ];
}

function ManagerView({ shifts, notifs, setModal }) {
  const [filter, setFilter] = useState('active');

  const active   = shifts.filter((s) => !isPast(s.date, s.time));
  const past     = shifts.filter((s) => isPast(s.date, s.time));
  const openAll  = active.filter((s) => s.status === 'open');
  const claimed  = active.filter((s) => s.status === 'claimed');
  const urgent   = openAll.filter((s) => hoursUntil(s.date, s.time) < 48);

  const filtered =
    filter === 'active'  ? active.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)) :
    filter === 'open'    ? openAll.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)) :
    filter === 'claimed' ? claimed.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)) :
    filter === 'past'    ? past.sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time)) : active;

  return (
    <div>
      <div style={styles.heroRow}>
        <div>
          <div style={styles.kicker}>Manager overview</div>
          <h1 style={styles.hero}>THE BOARD.</h1>
          <p style={styles.heroSub}>
            Live visibility on every coverage request across your coaching team.
          </p>
        </div>
      </div>

      <div style={styles.statRow}>
        <Stat label="Open (need cover)"    value={openAll.length} accent="red" />
        <Stat label="Covered / confirmed"  value={claimed.length} accent="green" />
        <Stat label="Urgent (< 48h)"       value={urgent.length}  accent={urgent.length ? 'red' : 'ink'} />
        <Stat label="Coaches active"       value={COACHES.filter((c) => c.role.includes('coach')).length} accent="ink" />
      </div>

      {urgent.length > 0 && (
        <div style={styles.alertBar}>
          <AlertCircle size={16} />
          <span>
            <strong>{urgent.length}</strong> open {urgent.length === 1 ? 'shift' : 'shifts'} within 48 hours and still uncovered.
          </span>
        </div>
      )}

      <div style={styles.filterRow}>
        {[
          { id: 'active',  label: 'All active',  n: active.length },
          { id: 'open',    label: 'Open',        n: openAll.length },
          { id: 'claimed', label: 'Covered',     n: claimed.length },
          { id: 'past',    label: 'Past',        n: past.length },
        ].map((f) => (
          <button
            key={f.id}
            onClick={() => setFilter(f.id)}
            style={{
              ...styles.filterBtn,
              ...(filter === f.id ? styles.filterBtnActive : {}),
            }}
          >
            {f.label} <span style={styles.filterCount}>{f.n}</span>
          </button>
        ))}
      </div>

      <Section title="Shifts" count={filtered.length} icon={<Calendar size={14} />}>
        {filtered.length === 0 ? (
          <EmptyState message="Nothing here for this filter." />
        ) : (
          filtered.map((s) => <ShiftCard key={s.id} shift={s} variant="manager" />)
        )}
      </Section>

      <Section title="Activity log" count={notifs.length} icon={<Activity size={14} />}>
        <div style={styles.logBox}>
          {notifs.slice(0, 20).map((n) => {
            const shift = shifts.find((s) => s.id === n.aboutShiftId);
            const actor = coachById(n.byCoachId);
            if (!shift) return null;
            return (
              <div key={n.id} style={styles.logRow}>
                <div style={styles.logTime}>{formatRelative(n.at)}</div>
                <div style={styles.logDot(n.type)} />
                <div style={styles.logText}>
                  <strong>{actor.name}</strong>{' '}
                  {n.type === 'posted' && <>posted <em>{shift.className}</em> on {formatDay(shift.date)} · {shift.time}</>}
                  {n.type === 'claimed' && <>claimed <em>{shift.className}</em> on {formatDay(shift.date)} · {shift.time}</>}
                  {n.type === 'cancelled' && <>cancelled their request for <em>{shift.className}</em></>}
                </div>
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

function ShiftCard({ shift, variant, onClaim, onCancel }) {
  const poster  = coachById(shift.postedBy);
  const claimer = shift.claimedBy ? coachById(shift.claimedBy) : null;
  const urgent  = shift.status === 'open' && hoursUntil(shift.date, shift.time) < 48 && hoursUntil(shift.date, shift.time) > 0;
  const past    = isPast(shift.date, shift.time);

  const statusColor =
    past ? '#87837b' : shift.status === 'open' ? '#c03434' : '#1d6b48';
  const statusLabel =
    past ? 'PAST' : shift.status === 'open' ? (urgent ? 'URGENT · OPEN' : 'OPEN') : 'COVERED';

  return (
    <article
      style={{
        ...styles.card,
        borderLeft: `4px solid ${statusColor}`,
        opacity: past ? 0.6 : 1,
      }}
    >
      <div style={styles.cardMain}>
        <div style={styles.cardTop}>

            <Calendar size={13} /> {formatDay(shift.date)}

            <Clock size={13} /> {shift.time}

        </div>

        <div style={styles.cardPeople}>
          <div style={styles.personLine}>
            <Avatar coach={poster} size={22} />
            <div style={styles.personText}>
              <span style={styles.personLabel}>Posted by</span>
              <span style={styles.personName}>{poster.name}</span>
            </div>
          </div>
          {claimer && (
            <>
              <ArrowRight size={14} style={{ color: '#87837b', flexShrink: 0 }} />
              <div style={styles.personLine}>
                <Avatar coach={claimer} size={22} />
                <div style={styles.personText}>
                  <span style={styles.personLabel}>Covered by</span>
                  <span style={styles.personName}>{claimer.name}</span>
                </div>

        {shift.reason && (
          <div style={styles.cardReason}>
            <span style={styles.reasonLabel}>REASON</span> {shift.reason}

      {variant === 'open-other' && onClaim && (
        <div style={styles.cardAction}>
          <button onClick={onClaim} style={styles.claimBtn}>
            <Check size={14} strokeWidth={3} /> I'LL COVER IT

  return (
